name: Deploy portfolio to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # 3.41+ regresses CanvasKit/SkWasm rendering in some Android social
          # WebViews: https://github.com/flutter/flutter/issues/188164
          flutter-version: 3.38.5
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze source
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build web release
        run: >-
          flutter build web --release --base-href /
          --dart-define=GA_MEASUREMENT_ID=${{ vars.GA_MEASUREMENT_ID }}
          --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          --dart-define=TELEMETRY_ENVIRONMENT=production
          --dart-define=PORTFOLIO_RELEASE=${{ github.sha }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
